<!DOCTYPE html>
<html>

<head>

<title>AI Phishing Email Detector</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
padding-top:100px;
}

.container{
background:white;
width:500px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

textarea{
width:90%;
height:120px;
padding:10px;
}

button{
background:#007bff;
color:white;
border:none;
padding:10px 20px;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.warning{
margin-top:10px;
font-size:18px;
color:orange;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Phishing Email Detector</h2>

<form method="post">

<textarea name="email" placeholder="Paste email text here"></textarea>

<br><br>

<button type="submit">Analyze Email</button>

</form>

<div class="result">

{% if prediction == "Phishing Email" %}
<p style="color:red;">⚠ {{prediction}}</p>

{% elif prediction == "Safe Email" %}
<p style="color:green;">✅ {{prediction}}</p>

{% endif %}

</div>

<p>{{probability}}</p>

<div class="warning">

{{warning}}

</div>

</div>

</body>

</html>
