<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detection</title>
</head>
<body>
    <h1>Phishing Email Detector</h1>

    <p>Model Accuracy: {{ accuracy }}%</p>

    <form method="POST">
        <textarea name="email" rows="10" cols="50" placeholder="Paste email here..."></textarea>
        <br><br>
        <button type="submit">Analyze</button>
    </form>

    {% if prediction %}
        <h2>Result: {{ prediction }}</h2>
    {% endif %}
</body>
</html>
